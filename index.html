<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cronômetro Capivara Clube</title>
    <style>
        /* --- MANTENDO SEUS ESTILOS ORIGINAIS --- */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1541447237128-f4bcb2918fbe?q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }

        /* --- ADIÇÃO: ESTILOS DOS BANNERS DE ALERTA --- */
        #leader-alert, #king-alert {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            text-transform: uppercase;
            text-align: center;
            transition: top 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #leader-alert {
            top: -150px;
            background: linear-gradient(90deg, #FFC107, #FF5722);
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8em;
            font-weight: bold;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
            border: 2px solid #000;
        }
        #king-alert {
            top: -200px;
            background: #000;
            color: #FFC107;
            padding: 20px 60px;
            border-radius: 15px;
            font-size: 2.2em;
            font-weight: bold;
            box-shadow: 0 0 50px rgba(255, 193, 7, 0.9);
            border: 4px double #FFC107;
        }
        .show-alert { top: 40px !important; }

        /* --- ADIÇÃO: ANIMAÇÕES DE POSIÇÃO NA TABELA --- */
        @keyframes highlightUp { 0% { background-color: rgba(76, 175, 80, 0.6); } 100% { background-color: transparent; } }
        @keyframes highlightDown { 0% { background-color: rgba(244, 67, 54, 0.6); } 100% { background-color: transparent; } }
        .pos-up { animation: highlightUp 4s ease-out; }
        .pos-down { animation: highlightDown 4s ease-out; }

        /* --- SEUS ESTILOS DE CONTAINER (MANTIDOS) --- */
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            background-color: rgba(18, 18, 18, 0.85);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.8em; color: #4CAF50; text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5); margin: 0; font-weight: bold; }
        .live-section { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .time-box, .record-box, .king-box {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .king-box { max-width: 950px; border-color: #FFC107; }
        .time-display, .record-display, .king-info .tempo {
            font-size: 4em;
            font-weight: bold;
            color: #FFC107;
            font-family: 'Courier New', monospace;
        }
        .category-ranking { background-color: #1e1e1e; border: 2px solid #333; border-radius: 15px; overflow: hidden; }
        .category-ranking table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #444; color: #e0e0e0; }
        .category-filter { margin-bottom: 20px; text-align: center; }
        select { background-color: #333; color: white; padding: 8px; border-radius: 5px; }
        footer { margin-top: 30px; text-align: center; color: #9e9e9e; border-top: 1px solid rgba(76, 175, 80, 0.3); padding: 15px; }
    </style>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div id="leader-alert"></div>
    <div id="king-alert"></div>

    <div class="dashboard-container">
        <header>
            <h1>Capivara Clube - Dashboard</h1>
            <p>Status: <span id="connection-status" style="color: #FF5722;">Desconectado</span></p>
        </header>

        <div class="live-section">
            <div class="time-box">
                <h2>PISTA 1 EXTERNA </h2>
                <div id="pista1-time" class="time-display">00.000s</div>
            </div>
            <div class="time-box">
                <h2>PISTA 2 INTERNA </h2>
                <div id="pista2-time" class="time-display">00.000s</div>
            </div>
        </div>

        <div class="live-section">
            <div class="record-box" id="record-pista1-box">
                <h2>RECORD PISTA 1 EXTERNA</h2>
                <div id="record-pista1-time" class="record-display">0.000s</div>
                <div id="record-pista1-info" style="color:#fff">Aguardando...</div>
            </div>
            <div class="record-box" id="record-pista2-box">
                <h2>RECORD PISTA 2 INTERNA</h2>
                <div id="record-pista2-time" class="record-display">0.000s</div>
                <div id="record-pista2-info" style="color:#fff">Aguardando...</div>
            </div>
        </div>

        <div class="live-section">
            <div class="king-box">
                <h2>REI DA PISTA </h2>
                <div class="king-info">
                    <div id="king-time" class="tempo">0.000s</div>
                    <div id="king-piloto-info" style="font-size:1.6em; color:#4CAF50"></div>
                    <div id="king-track" style="font-style:italic"></div>
                </div>
            </div>
        </div>

        <div class="category-filter">
            <label>Filtrar Categoria:</label>
            <select id="categoria" onchange="updateRanking()"></select>
        </div>

        <div class="category-ranking">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Nome</th>
                        <th>Cat</th>
                        <th>P1</th>
                        <th>P2</th>
                        <th>Soma</th>
                        <th>Diff</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>By Mauricio Stenico🏎️ - 2026</p>
    </footer>

    <script>
        const googleScriptURL = "https://script.google.com/macros/s/AKfycbx6BbQbgdffb_sVon5PSu6M1EK-2_qN2aNbLbzAat_Vx8Kuvv-mVckZI9Kp7Cdd08E/exec";
        const mqttServer = 'ws://192.168.0.178:9001'; 
        
        // --- CONTROLE DE ESTADO PARA ANIMAÇÕES ---
        let lastLeaderId = null;
        let lastKingTime = Infinity;
        let lastRankingOrder = {}; // Para comparar subida/descida

        const client = mqtt.connect(mqttServer, { clientId: 'web_' + Math.random().toString(16).substr(2, 5) });

        const elements = {
            connectionStatus: document.getElementById('connection-status'),
            pista1Time: document.getElementById('pista1-time'),
            pista2Time: document.getElementById('pista2-time'),
            rankingBody: document.getElementById('ranking-body'),
            categoriaSelect: document.getElementById('categoria'),
            recordPista1Time: document.getElementById('record-pista1-time'),
            recordPista2Time: document.getElementById('record-pista2-time'),
            recordPista1Box: document.getElementById('record-pista1-box'),
            recordPista2Box: document.getElementById('record-pista2-box'),
            recordPista1Info: document.getElementById('record-pista1-info'),
            recordPista2Info: document.getElementById('record-pista2-info'),
            kingTime: document.getElementById('king-time'),
            kingPilotoInfo: document.getElementById('king-piloto-info'),
            kingTrack: document.getElementById('king-track')
        };

        // --- FUNÇÕES DE ALERTA ---
        function triggerLeaderAlert(nome) {
            const el = document.getElementById('leader-alert');
            el.textContent = `${nome} ASSUMIU A 1º POSIÇÂO! 🏆`;
            el.classList.add('show-alert');
            setTimeout(() => el.classList.remove('show-alert'), 7000);
        }

        function triggerKingAlert(nome, tempo) {
            const el = document.getElementById('king-alert');
            el.innerHTML = `<span style="font-size:0.5em; display:block">NOVO REI DA PISTA</span>${nome}<br>${tempo.toFixed(3)}s 🏁`;
            el.classList.add('show-alert');
            setTimeout(() => el.classList.remove('show-alert'), 7000);
        }

        // --- SEU MQTT ORIGINAL ---
        client.on('connect', () => {
            elements.connectionStatus.textContent = 'Conectado';
            elements.connectionStatus.style.color = '#4CAF50';
            client.subscribe(["cronometro/resultado/pista1", "cronometro/resultado/pista2", "cronometro/lcd"]);
            updateRanking();
        });

        client.on('message', (topic, message) => {
            const msg = message.toString();
            if (topic.includes("pista1")) elements.pista1Time.textContent = parseFloat(msg).toFixed(3) + "s";
            if (topic.includes("pista2")) elements.pista2Time.textContent = parseFloat(msg).toFixed(3) + "s";
            if (topic === "cronometro/lcd" && msg.includes("Pistas Liberadas")) {
                elements.pista1Time.textContent = "00.000s";
                elements.pista2Time.textContent = "00.000s";
            }
        });

        // --- SUA LÓGICA DE RANKING (COM GATILHOS ADICIONADOS) ---
        async function updateRanking() {
            try {
                const response = await fetch(googleScriptURL);
                const data = await response.json();
                
                const competidores = {};
                let kingOfTheTrack = { tempo: Infinity, nome: '', categoria: '', pista: '' };
                let recP1 = { tempo: Infinity, nome: '' }, recP2 = { tempo: Infinity, nome: '' };

                // Processamento dos dados (Sua lógica de agregação)
                data.forEach(item => {
                    // Records e Rei da Pista
                    if (item.tempo_p1 > 0) {
                        if (item.tempo_p1 < kingOfTheTrack.tempo) kingOfTheTrack = { tempo: item.tempo_p1, nome: item.nome_p1, categoria: item.categoria_p1, pista: 'Pista 1' };
                        if (item.tempo_p1 < recP1.tempo) recP1 = { tempo: item.tempo_p1, nome: item.nome_p1 };
                    }
                    if (item.tempo_p2 > 0) {
                        if (item.tempo_p2 < kingOfTheTrack.tempo) kingOfTheTrack = { tempo: item.tempo_p2, nome: item.nome_p2, categoria: item.categoria_p2, pista: 'Pista 2' };
                        if (item.tempo_p2 < recP2.tempo) recP2 = { tempo: item.tempo_p2, nome: item.nome_p2 };
                    }

                    // Agrupamento para Ranking
                    const id = item.id_p1 || item.id_p2;
                    if (!id) return;
                    if (!competidores[id]) competidores[id] = { nome: item.nome_p1 || item.nome_p2, categoria: item.categoria_p1 || item.categoria_p2, p1: Infinity, p2: Infinity };
                    if (item.tempo_p1 > 0) competidores[id].p1 = Math.min(competidores[id].p1, item.tempo_p1);
                    if (item.tempo_p2 > 0) competidores[id].p2 = Math.min(competidores[id].p2, item.tempo_p2);
                });

                // GATILHO: REI DA PISTA
                if (kingOfTheTrack.tempo < lastKingTime && lastKingTime !== Infinity) {
                    triggerKingAlert(kingOfTheTrack.nome, kingOfTheTrack.tempo);
                }
                lastKingTime = kingOfTheTrack.tempo;

                // Atualiza UI King/Records
                elements.kingTime.textContent = kingOfTheTrack.tempo === Infinity ? "0.000s" : kingOfTheTrack.tempo.toFixed(3) + "s";
                elements.kingPilotoInfo.textContent = kingOfTheTrack.nome;
                elements.recordPista1Time.textContent = recP1.tempo.toFixed(3) + "s";
                elements.recordPista1Info.textContent = recP1.nome;
                elements.recordPista2Time.textContent = recP2.tempo.toFixed(3) + "s";
                elements.recordPista2Info.textContent = recP2.nome;

                // Ranking Final
                let rankingArray = Object.values(competidores)
                    .filter(c => c.p1 !== Infinity && c.p2 !== Infinity)
                    .map(c => ({ ...c, soma: c.p1 + c.p2 }))
                    .sort((a, b) => a.soma - b.soma);

                // GATILHO: NOVO LÍDER
                if (rankingArray.length > 0) {
                    const currentLeader = rankingArray[0];
                    if (lastLeaderId !== null && lastLeaderId !== currentLeader.nome) { // Usei nome pois ID pode ser volátil no seu JSON
                        triggerLeaderAlert(currentLeader.nome);
                    }
                    lastLeaderId = currentLeader.nome;
                }

                // Filtro Categorias
                const sel = elements.categoriaSelect.value;
                const cats = ['TODOS', ...new Set(Object.values(competidores).map(c => c.categoria))].sort();
                elements.categoriaSelect.innerHTML = cats.map(c => `<option value="${c}" ${c===sel?'selected':''}>${c}</option>`).join('');
                if (sel && sel !== 'TODOS') rankingArray = rankingArray.filter(c => c.categoria === sel);

                // Render Table com Animação
                elements.rankingBody.innerHTML = '';
                rankingArray.forEach((c, i) => {
                    const row = document.createElement('tr');
                    // Compara posição antiga para animar
                    if (lastRankingOrder[c.nome] !== undefined) {
                        if (i < lastRankingOrder[c.nome]) row.classList.add('pos-up');
                        else if (i > lastRankingOrder[c.nome]) row.classList.add('pos-down');
                    }
                    
                    const diff = c.soma - rankingArray[0].soma;
                    row.innerHTML = `<td>${i+1}º</td><td>${c.nome}</td><td>${c.categoria}</td><td>${c.p1.toFixed(3)}s</td><td>${c.p2.toFixed(3)}s</td><td>${c.soma.toFixed(3)}s</td><td>${diff>0?'+'+diff.toFixed(3):'-'}</td>`;
                    elements.rankingBody.appendChild(row);
                });

                // Salva ordem atual para a próxima atualização
                lastRankingOrder = {};
                rankingArray.forEach((c, i) => lastRankingOrder[c.nome] = i);

            } catch (e) { console.error(e); }
        }

        setInterval(updateRanking, 3000);
        document.addEventListener('DOMContentLoaded', updateRanking);
    </script>
</body>
</html>
